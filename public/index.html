<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظفين - مصنع الريس</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="login-container">
        <div class="logo-container">
            <img src="images/logo.png" alt="شعار المصنع" class="logo-image" onerror="this.style.display='none'">
            <div class="factory-name">مصنع الريس لإنتاج وتوزيع الفحم</div>
        </div>
        <div class="subtitle">بوابة الموظفين</div>
        
        <div class="input-group">
            <label>📱 رقم الهاتف</label>
            <input type="tel" id="phone-input" placeholder="05xxxxxxxx" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>🔑 كلمة المرور</label>
            <input type="password" id="password-input" placeholder="••••••••">
        </div>
        
        <button onclick="login()">تسجيل الدخول</button>
        
        <div id="login-error" class="error-message"></div>
    </div>

    <!-- شاشة لوحة التحكم -->
    <div id="dashboard-screen" class="dashboard-container hidden">
        <div class="dashboard-header">
            <div class="employee-info">
                <h2 id="employee-name">👤 اسم الموظف</h2>
                <p id="employee-phone">📱 رقم الهاتف</p>
            </div>
            <div>
                <button class="export-btn" onclick="exportReportAsImage()">📸 حفظ كصورة</button>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value" id="total-hours">0</div>
                <div class="stat-label">إجمالي ساعات العمل</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="total-overtime">0</div>
                <div class="stat-label">إجمالي الساعات الإضافية</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="total-vacation">0</div>
                <div class="stat-label">أيام الإجازات</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="total-loans">0 ₪</div>
                <div class="stat-label">إجمالي السلف</div>
            </div>
        </div>

        <h3 class="section-title">📋 سجل أيام العمل</h3>
        <div class="table-wrapper">
            <table class="reports-table">
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>البدء</th>
                        <th>الانتهاء</th>
                        <th>إضافي</th>
                        <th>الخصم</th>
                        <th>الملاحظات</th>
                        <th>ساعات العمل</th>
                        <th>السلفة</th>
                    </tr>
                </thead>
                <tbody id="reports-body">
                    <tr><td colspan="8" class="loading">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
